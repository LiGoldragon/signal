[package]
name         = "signal"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal"
description  = "signal — the criome binary language. Wire envelope (Frame, handshake) + language IR (RawPattern, RawOp, AssertOp, …) + sema record kinds (KindDecl, Struct, Enum, …). Anything criome is signal."

[dependencies]
rkyv = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
serde = { version = "1", features = ["derive"] }
blake3 = "1.5"
thiserror = "2"

[lints.rust]
unused = "allow"
dead_code = "allow"
